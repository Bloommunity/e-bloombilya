<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="theme-color" content="#000000" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<title>E-Bloombilya — Virtual Lightstick</title>
		<meta property="og:title" content="E-Bloombilya — Virtual Lightstick" />
		<meta
			property="og:description"
			content="A BINI-inspired virtual lightstick app with official lightstick styling, color swatches, and animated glow modes."
		/>
		<meta property="og:image" content="/images/bloombilya.png" />
		<meta property="og:image:type" content="image/png" />
		<meta property="og:image:width" content="1563" />
		<meta property="og:image:height" content="1563" />
		<meta property="og:image:alt" content="E-Bloombilya virtual lightstick" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:image" content="/images/bloombilya.png" />
		<meta name="twitter:image:alt" content="E-Bloombilya virtual lightstick" />
		<link rel="manifest" href="manifest.json" />
		<link rel="apple-touch-icon" href="images/bloombilya.png" />
		<link rel="icon" href="images/bloombilya.png" />
		<link rel="shortcut icon" href="images/bloombilya.png" />
		<link rel="stylesheet" href="styles.css" />
	</head>
	<body>
		<main class="container">
			<h1 class="title">E‑Bloombilya — Virtual Lightstick</h1>

			<section class="light-area">
				<div id="lightstick" class="lightstick" aria-hidden="false">
					<div class="head">
						<div class="glow" id="glow"></div>
						<div class="face">
							<img
								id="face-img"
								src="images/bloombilya.png"
								alt="BINI bloombilya lightstick"
							/>
						</div>
						<button
							id="infinity-btn"
							class="infinity"
							aria-label="Toggle power"
							title="Toggle power"
						></button>
					</div>
				</div>
			</section>

			<section class="controls">
				<div class="row">
					<button id="btn-on" class="btn white">On</button>
					<button id="btn-off" class="btn white">Off</button>
				</div>

				<div class="modes" role="tablist" aria-label="Light modes">
					<span class="mode-label">Mode:</span>
					<button class="btn mode active" data-mode="fixed">Fixed</button>
					<button class="btn mode" data-mode="random">Random</button>
					<button class="btn mode" data-mode="blink">Blink</button>
				</div>

				<div class="colors-grid" id="colors" aria-label="Choose color">
					<!-- color buttons injected by JS -->
				</div>

				<p class="hint">
					Tip: Turn on and choose a mode — use during concerts on your phone.
				</p>
			</section>
		</main>

		<script src="script.js"></script>
		<script>
			// register service worker if available
			if ("serviceWorker" in navigator) {
				window.addEventListener("load", () => {
					navigator.serviceWorker.register("/sw.js").catch(() => {});
				});
			}
		</script>
	</body>
</html>
